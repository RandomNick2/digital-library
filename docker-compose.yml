services:
  backend:
    build: ./backend
    container_name: django_backend

    command: sh -c "sleep 5 && python manage.py runserver 0.0.0.0:8000"

    volumes:
      - ./backend:/app

    ports:
      - '8000:8000'

    depends_on:
      - db

  db:
    image: postgres:17

    container_name: postgres_db

    environment:
      POSTGRES_DB: digital_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - '5432:5432'
